name: Release (tag + GitHub Release + back-merge PR)

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for tags

      - name: Extract and validate release version
        id: ver
        shell: bash
        run: |
          config_version=$(python - <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("paddle/config/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__ = "([0-9]+\.[0-9]+\.[0-9]+)"$', text, re.MULTILINE)
          if not match:
              sys.stderr.write("Could not find __version__ in paddle/config/__init__.py\n")
              raise SystemExit(1)
          print(match.group(1))
          PY
          )

          changelog_version=$(python - <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(r'^## \[([0-9]+\.[0-9]+\.[0-9]+)\] - ', text, re.MULTILINE)
          if not match:
              sys.stderr.write("No released version header found in CHANGELOG.md\n")
              raise SystemExit(1)
          print(match.group(1))
          PY
          )

          if [ "$config_version" != "$changelog_version" ]; then
            echo "Version mismatch: paddle/config/__init__.py has $config_version but CHANGELOG.md latest release is $changelog_version"
            exit 1
          fi

          echo "version=$config_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$config_version" >> "$GITHUB_OUTPUT"

      - name: Configure git identity for tag creation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag if missing
        shell: bash
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Skipping tag creation."
            exit 0
          fi
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release (notes from CHANGELOG section)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          ver="${{ steps.ver.outputs.version }}"

          # Extract section text from CHANGELOG: from "## [ver]" until next "## ["
          notes=$(awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            notes="(No release notes found under ## [$ver] in CHANGELOG.md)"
          fi

          # Create release if missing
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release $tag already exists. Skipping."
            exit 0
          fi

          gh release create "$tag" \
            --title "Release $tag" \
            --notes "$notes"

      - name: Open back-merge PR main -> develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          # Avoid duplicate PRs
          if gh pr list --base develop --head main --state open --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --base develop \
              --head main \
              --title "chore(branches): back-merge main into develop after $tag" \
              --body "Automated back-merge after release $tag."
          else
            echo "Back-merge PR already open. Skipping."
          fi
