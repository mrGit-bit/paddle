name: Release Prep (no-AI)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (X.Y.Z), e.g. 1.3.0"
        required: true
      target_branch:
        description: "Branch to prepare release from (usually develop)"
        required: true
        default: "develop"

permissions:
  contents: write
  pull-requests: write

jobs:
  prep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Install gh (GitHub CLI)
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Prepare release branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          BRANCH="chore/release-v${VERSION}"

          # Delete remote branch if it already exists
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Remote branch exists. Deleting..."
            git push origin --delete "$BRANCH"
          fi

          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Update CHANGELOG.md (move Unreleased -> version)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python .github/scripts/prepare_release_changelog.py --version "$VERSION"

      - name: Update config.__version__
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          VERSION = os.environ["VERSION"]
          path = Path("paddle/config/__init__.py")

          if not path.exists():
              raise SystemExit("config/__init__.py not found")

          text = path.read_text(encoding="utf-8")

          if "__version__" in text:
              text = re.sub(
                  r'__version__\s*=\s*".*?"',
                  f'__version__ = "{VERSION}"',
                  text
              )
          else:
              text += f'\n__version__ = "{VERSION}"\n'

          path.write_text(text, encoding="utf-8")
          print(f"Updated __version__ to {VERSION}")
          PY


      - name: Commit changes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md paddle/config/__init__.py
          if git diff --cached --quiet; then
            echo "No release file changes staged (CHANGELOG.md or paddle/config/__init__.py). Exiting."
            exit 1
          fi

          git commit -m "version(release): prepare release v${VERSION}"
          git push -u origin "$BRANCH"

      - name: Open PR to target branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          TARGET: ${{ inputs.target_branch }}
        run: |
          set -e

          python .github/scripts/release_pr_body.py \
            --version "$VERSION" \
            --target-branch "$TARGET" \
            --output-path /tmp/release-pr-body.md

          gh pr create \
            --base "$TARGET" \
            --head "$BRANCH" \
            --title "version(release): prepare release v${VERSION}" \
            --body-file /tmp/release-pr-body.md
